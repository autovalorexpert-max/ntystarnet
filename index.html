<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#030712">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="NTY Starnet">
<link rel="manifest" href="/manifest.json">
<title>NTY Starnet — WiFi Manager Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#030712;--bg2:#060f1f;--card:#0d1f38;--card2:#112240;
  --border:rgba(99,179,255,0.12);--border2:rgba(99,179,255,0.25);
  --accent:#3b82f6;--accent2:#60a5fa;
  --success:#10b981;--danger:#ef4444;--warning:#f59e0b;--purple:#8b5cf6;
  --text:#f0f9ff;--text2:#94a3b8;--text3:#475569;
  --font:'Space Grotesk',sans-serif;--mono:'Space Mono',monospace;
  --r:12px;--r2:16px;--r3:24px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.page{display:none;min-height:100vh}.page.active{display:block}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s)}
@keyframes twinkle{0%,100%{opacity:0.1}50%{opacity:var(--op,0.6)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp 0.35s ease}

/* LOGIN */
.login-wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.login-glow{position:fixed;top:-150px;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(ellipse,rgba(59,130,246,0.1) 0%,transparent 70%);pointer-events:none}
.logo-wrap{text-align:center;margin-bottom:32px}
.logo-ring-wrap{width:90px;height:90px;margin:0 auto 18px;position:relative}
.logo-ring{position:absolute;inset:0;border-radius:50%;border:2px solid var(--border2);animation:spin 8s linear infinite}
.logo-ring2{position:absolute;inset:8px;border-radius:50%;border:1px solid rgba(99,179,255,0.1);animation:spin 14s linear infinite reverse}
.logo-inner{position:absolute;inset:14px;background:linear-gradient(135deg,#0a1628,#1a3a6e);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 30px rgba(59,130,246,0.3)}
.logo-name{font-family:var(--mono);font-size:28px;font-weight:700;letter-spacing:4px;background:linear-gradient(135deg,#60a5fa,#a78bfa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:11px;letter-spacing:5px;text-transform:uppercase;color:var(--text3);margin-top:6px}
.logo-tagline{font-size:14px;color:var(--text2);margin-top:10px;font-style:italic}
.login-card{background:linear-gradient(135deg,rgba(13,31,56,0.95),rgba(17,34,64,0.95));border:1px solid var(--border2);border-radius:var(--r3);padding:32px;width:100%;max-width:390px;backdrop-filter:blur(20px);box-shadow:0 0 40px rgba(59,130,246,0.08),0 25px 60px rgba(0,0,0,0.6)}
.login-title{font-size:20px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:24px}
.form-label{font-size:11px;font-weight:700;letter-spacing:0.08em;color:var(--text2);margin-bottom:7px;display:block;text-transform:uppercase}
.form-input{width:100%;padding:13px 16px;border:1px solid var(--border);border-radius:var(--r);font-size:14px;background:rgba(3,7,18,0.7);color:var(--text);margin-bottom:16px;outline:none;font-family:var(--font);transition:all .2s}
.form-input:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(59,130,246,0.12)}
.pass-wrap{position:relative;margin-bottom:16px}
.pass-wrap .form-input{margin-bottom:0;padding-right:48px}
.eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px}
.login-err{display:none;align-items:center;gap:8px;padding:11px 14px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:var(--r);margin-bottom:14px;font-size:13px;color:#f87171}
.btn-login{width:100%;padding:15px;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;font-family:var(--font);transition:all .2s;box-shadow:0 6px 24px rgba(59,130,246,0.3);display:flex;align-items:center;justify-content:center;gap:8px}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 8px 30px rgba(59,130,246,0.4)}
.btn-login:disabled{opacity:0.7;cursor:not-allowed;transform:none}
.btn-spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
.login-footer{text-align:center;font-size:12px;color:var(--text3);margin-top:24px}

/* LAYOUT */
.app-wrap{position:relative;z-index:1;max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:80px}
.topbar{position:sticky;top:0;z-index:50;background:rgba(3,7,18,0.92);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.topbar-logo{display:flex;align-items:center;gap:10px}
.topbar-icon{width:34px;height:34px;background:linear-gradient(135deg,#1a3a6e,#2d3a8e);border-radius:9px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border2)}
.topbar-name{font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:2px;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.topbar-role{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase}
.deco-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;cursor:pointer;color:var(--text3);font-size:12px;font-family:var(--font);transition:all .15s}
.deco-btn:hover{border-color:var(--border2);color:var(--text2)}
.content{padding:16px}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(3,7,18,0.97);backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;z-index:50;padding:8px 0 14px}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 4px;cursor:pointer;border:none;background:none;color:var(--text3);font-size:9px;font-family:var(--font);letter-spacing:0.06em;text-transform:uppercase;transition:color .2s;position:relative}
.nav-btn.active{color:var(--accent2)}
.nav-dot{position:absolute;top:4px;right:calc(50% - 14px);width:7px;height:7px;background:var(--danger);border-radius:50%;border:2px solid var(--bg);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* NOTIFICATIONS */
.notif-card{display:flex;gap:12px;padding:14px;border-radius:var(--r);margin-bottom:10px;border:1px solid;align-items:flex-start}
.notif-info{background:rgba(59,130,246,0.06);border-color:rgba(59,130,246,0.2)}
.notif-warning{background:rgba(245,158,11,0.07);border-color:rgba(245,158,11,0.25)}
.notif-danger{background:rgba(239,68,68,0.07);border-color:rgba(239,68,68,0.25)}
.notif-success{background:rgba(16,185,129,0.06);border-color:rgba(16,185,129,0.2)}
.notif-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.notif-body{flex:1}
.notif-title{font-size:13px;font-weight:700;margin-bottom:4px}
.notif-info .notif-title{color:var(--accent2)}
.notif-warning .notif-title{color:#fbbf24}
.notif-danger .notif-title{color:#f87171}
.notif-success .notif-title{color:#34d399}
.notif-msg{font-size:12px;color:var(--text2);line-height:1.6}

/* HERO CARD */
.hero-card{background:linear-gradient(135deg,#0a1628,#112240);border:1px solid var(--border2);border-radius:20px;padding:20px;margin-bottom:12px;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.hero-card::before{content:'';position:absolute;top:-40%;right:-15%;width:200px;height:200px;background:radial-gradient(ellipse,rgba(59,130,246,0.07),transparent);pointer-events:none}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.hero-label{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);margin-bottom:6px}
.hero-right{text-align:right}
.hero-plan{font-weight:700;font-size:16px}
.hero-price{font-size:12px;color:var(--text3)}
.hero-mid{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:12px}
.hero-exp{font-weight:600;font-size:13px;line-height:1.4}
.hero-days-wrap{text-align:right}
.hero-days{font-family:var(--mono);font-size:32px;font-weight:700;line-height:1}
.expiry-track{height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;margin-bottom:16px}
.expiry-fill{height:100%;border-radius:2px;transition:width 1s}

/* TICKET */
.ticket-card{background:linear-gradient(135deg,rgba(59,130,246,0.08),rgba(99,102,241,0.06));border:1px solid var(--border2);border-radius:var(--r2);padding:20px;text-align:center;margin-bottom:12px}
.ticket-label{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--text3);margin-bottom:10px}
.ticket-code{font-family:var(--mono);font-size:26px;font-weight:700;color:var(--accent2);letter-spacing:3px;word-break:break-all;text-shadow:0 0 20px rgba(96,165,250,0.3)}
.ticket-valid{font-size:11px;color:var(--text3);margin-top:8px;line-height:1.5}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat-pill{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 8px;text-align:center}
.stat-pill-num{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--accent2)}
.stat-pill-lbl{font-size:10px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:0.05em}

/* CARDS */
.section-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:12px;position:relative;overflow:hidden}
.section-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(99,179,255,0.2),transparent)}
.section-head{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--text3);margin-bottom:14px}
.section-head-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.count-badge{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.2);font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-active{background:rgba(16,185,129,0.12);color:#34d399;border:1px solid rgba(16,185,129,0.2)}
.badge-expired{background:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(239,68,68,0.2)}
.badge-pending{background:rgba(245,158,11,0.12);color:#fbbf24;border:1px solid rgba(245,158,11,0.2)}
.badge-validated{background:rgba(16,185,129,0.12);color:#34d399;border:1px solid rgba(16,185,129,0.2)}
.badge-rejected{background:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(239,68,68,0.2)}

/* BUTTONS */
.btn{width:100%;padding:12px 16px;border-radius:var(--r);border:none;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:var(--font);transition:all .15s;margin-bottom:8px}
.btn:active{transform:scale(0.97)}.btn:disabled{opacity:0.6;cursor:not-allowed}
.btn-full{width:100%}.btn-sm{padding:9px 14px;font-size:13px;width:auto;margin:0}
.btn-primary{background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;box-shadow:0 4px 16px rgba(59,130,246,0.25)}
.btn-success{background:linear-gradient(135deg,#10b981,#059669);color:#fff}
.btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}
.btn-ghost{background:rgba(255,255,255,0.04);border:1px solid var(--border2);color:var(--text2)}

/* INPUTS */
.inp{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:var(--r);font-size:14px;background:rgba(3,7,18,0.6);color:var(--text);margin-bottom:10px;outline:none;font-family:var(--font);transition:all .2s}
.inp:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(59,130,246,0.08)}
.inp-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block}
textarea.inp{resize:vertical;min-height:80px}select.inp{cursor:pointer}

/* GREETING */
.greeting{margin-bottom:16px}
.greeting-text{font-size:14px;color:var(--text2)}
.greeting-name{font-size:24px;font-weight:700;background:linear-gradient(135deg,var(--text),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* HISTORY */
.history-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.history-row:last-child{border-bottom:none}
.history-left{display:flex;align-items:center;gap:10px}
.history-icon{font-size:20px}
.history-plan{font-size:13px;font-weight:600}
.history-date{font-size:11px;color:var(--text3);margin-top:2px}
.history-right{text-align:right}
.history-amount{font-family:var(--mono);font-size:13px;font-weight:700;margin-bottom:4px}

/* PAGE HEADERS */
.page-header{margin-bottom:16px}
.page-header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.page-title{font-size:22px;font-weight:700}
.page-sub{font-size:13px;color:var(--text2);margin-top:2px}

/* PAY BOX */
.pay-box{background:linear-gradient(135deg,rgba(16,185,129,0.07),rgba(5,150,105,0.05));border:1px solid rgba(16,185,129,0.2);border-radius:var(--r2);padding:18px;margin-bottom:14px}
.pay-box-title{font-size:12px;font-weight:700;color:#34d399;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.06em}
.pay-nums{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.pay-num{font-family:var(--mono);font-size:17px;font-weight:700;color:#34d399}
.pay-box-sub{font-size:12px;color:var(--text3)}

/* PLAN CARDS */
.plan-card{display:flex;align-items:center;gap:12px;border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px;cursor:pointer;transition:all .2s;position:relative}
.plan-card.selected{border-color:var(--accent);border-width:2px;background:rgba(59,130,246,0.07)}
.plan-card.selected::after{content:'✓';position:absolute;top:10px;right:12px;color:var(--accent2);font-weight:700;font-size:16px}
.plan-icon{font-size:24px;flex-shrink:0}
.plan-info{flex:1}
.plan-name{font-weight:600;font-size:14px}
.plan-desc{font-size:11px;color:var(--text3);margin-top:2px}
.plan-price{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--accent2);flex-shrink:0}

/* UPLOAD */
.upload-zone{border:1.5px dashed var(--border2);border-radius:var(--r);padding:24px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:10px}
.upload-zone:hover{border-color:var(--accent2);background:rgba(59,130,246,0.04)}
.upload-icon{font-size:32px;margin-bottom:8px}
.upload-text{font-size:13px;color:var(--text2)}
.upload-sub{font-size:11px;color:var(--text3);margin-top:4px}

/* CHAT */
.chat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.chat-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--card2)}
.chat-avatar{font-size:24px}
.chat-name{font-weight:600;font-size:14px}
.chat-status{font-size:11px;color:var(--success);margin-top:2px}
.msg-list{padding:14px;min-height:220px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;max-height:320px}
.msg-wrap{display:flex;flex-direction:column}
.msg-sent{align-items:flex-end}.msg-recv{align-items:flex-start}
.bubble{padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.6;max-width:82%;word-break:break-word}
.bubble-sent{background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;border-bottom-right-radius:4px}
.bubble-recv{background:var(--card2);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg-time{font-size:10px;color:var(--text3);margin-top:4px}
.chat-inp{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--border);background:var(--card2)}
.chat-inp-field{flex:1;background:rgba(3,7,18,0.6);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;color:var(--text);font-size:13px;outline:none;font-family:var(--font)}
.chat-inp-field:focus{border-color:var(--accent2)}
.chat-send-btn{background:linear-gradient(135deg,#3b82f6,#6366f1);border:none;border-radius:var(--r);padding:10px 18px;color:#fff;cursor:pointer;font-size:16px;font-weight:700;transition:transform .15s}
.chat-send-btn:active{transform:scale(0.93)}

/* PROFILE */
.profile-hero{text-align:center;padding:24px 16px;margin-bottom:12px}
.profile-avatar{width:80px;height:80px;border-radius:22px;background:linear-gradient(135deg,#1a3a6e,#2d3a8e);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:26px;font-weight:700;color:var(--accent2);font-family:var(--mono);border:2px solid var(--border2);box-shadow:0 0 24px rgba(59,130,246,0.15)}
.profile-name{font-size:20px;font-weight:700;margin-bottom:4px}
.profile-username{font-size:13px;color:var(--text2);margin-bottom:10px}

/* INFO */
.info-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.info-key{font-size:12px;color:var(--text3)}
.info-val{font-size:13px;font-weight:500;text-align:right}
.info-box{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:12px}

/* ADMIN */
.revenue-hero{background:linear-gradient(135deg,rgba(245,158,11,0.1),rgba(217,119,6,0.06));border:1px solid rgba(245,158,11,0.2);border-radius:var(--r2);padding:20px;margin-bottom:12px}
.revenue-label{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#f59e0b;margin-bottom:8px}
.revenue-amount{font-family:var(--mono);font-size:34px;font-weight:700;color:#fbbf24;line-height:1}
.revenue-amount span{font-size:18px;color:#f59e0b}
.revenue-sub{font-size:12px;color:var(--text3);margin-top:6px}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px}
.stat-card-admin{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;text-align:center}
.stat-card-num{font-family:var(--mono);font-size:32px;font-weight:700;line-height:1}
.stat-card-lbl{font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-top:5px}
.pay-item{padding:12px 0;border-bottom:1px solid var(--border)}
.pay-item:last-child{border-bottom:none}
.pay-item-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.pay-item-name{font-weight:700;font-size:14px}
.pay-item-sub{font-size:12px;color:var(--text3);margin-top:2px}
.pay-item-ticket{font-size:12px;color:var(--success);margin-top:4px}
.pay-item-notick{font-size:12px;color:var(--danger);margin-top:4px}
.pay-item-amount{font-family:var(--mono);font-weight:700;font-size:15px;color:var(--accent2)}
.pay-item-btns{display:flex;gap:8px}
.client-list{display:flex;flex-direction:column;gap:8px}
.client-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s}
.client-card:hover{border-color:var(--border2)}
.client-avatar{width:44px;height:44px;border-radius:13px;background:linear-gradient(135deg,#1a3a6e,#2d3a8e);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--accent2);flex-shrink:0;border:1px solid var(--border2)}
.client-info{flex:1;min-width:0}
.client-name{font-weight:600;font-size:14px}
.client-meta{font-size:11px;color:var(--text3);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.client-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.client-arrow{color:var(--text3);font-size:18px}
.filter-tabs{display:flex;gap:4px;background:rgba(3,7,18,0.6);border-radius:var(--r);padding:4px;margin-bottom:16px;border:1px solid var(--border)}
.ftab{flex:1;padding:9px;text-align:center;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;border:none;background:transparent;color:var(--text3);text-transform:uppercase;font-family:var(--font);transition:all .15s}
.ftab.active{background:var(--card2);color:var(--text);border:1px solid var(--border2)}
.pay-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:10px}
.pay-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.pay-card-name{font-weight:700;font-size:15px}
.pay-card-sub{font-size:12px;color:var(--text3);margin-top:2px}
.pay-card-ref{font-size:11px;color:var(--text3);margin-top:2px;font-family:var(--mono)}
.pay-card-right{text-align:right}
.pay-card-amount{font-family:var(--mono);font-weight:700;font-size:16px;color:var(--accent2);margin-bottom:5px}
.pay-card-btns{display:flex;gap:8px;margin-top:10px}
.ticket-preview{font-size:12px;color:var(--success);padding:8px 12px;background:rgba(16,185,129,0.06);border-radius:8px;margin-bottom:8px}
.ticket-preview-big{background:rgba(59,130,246,0.07);border:1px solid var(--border2);border-radius:var(--r);padding:16px;text-align:center;margin:14px 0}
.tp-label{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);margin-bottom:8px}
.tp-code{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--accent2);letter-spacing:2px;word-break:break-all}
.search-box{position:relative;margin-bottom:12px}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px}
.search-inp{width:100%;padding:11px 14px 11px 40px;border:1px solid var(--border);border-radius:var(--r);font-size:14px;background:rgba(3,7,18,0.6);color:var(--text);outline:none;font-family:var(--font)}
.search-inp:focus{border-color:var(--accent2)}
.conv-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s}
.conv-card:hover{border-color:var(--border2)}
.conv-avatar{width:44px;height:44px;border-radius:13px;background:linear-gradient(135deg,#1a3a6e,#2d3a8e);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--accent2);flex-shrink:0;border:1px solid var(--border2)}
.conv-info{flex:1;min-width:0}
.conv-name{font-weight:600;font-size:14px}
.conv-last{font-size:12px;color:var(--text3);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.conv-right{flex-shrink:0;text-align:right}
.conv-time{font-size:10px;color:var(--text3);margin-top:4px}
.prog-wrap{margin-bottom:12px}
.prog-label{display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px}
.prog-val{color:var(--text2);font-family:var(--mono)}
.prog-bar{height:6px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .8s}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px)}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:var(--r3) var(--r3) 0 0;padding:24px;width:100%;max-width:430px;max-height:90vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,0.5)}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;cursor:pointer;color:var(--text3);font-size:24px;line-height:1;padding:0}
.modal-client{font-size:14px;color:var(--text2);margin-bottom:14px}
.modal-avatar{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#1a3a6e,#2d3a8e);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--accent2);flex-shrink:0;border:1px solid var(--border2)}
.dtabs{display:flex;gap:4px;background:rgba(3,7,18,0.6);border-radius:var(--r);padding:4px;margin-bottom:16px;border:1px solid var(--border)}
.dtab{flex:1;padding:9px;text-align:center;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;border:none;background:transparent;color:var(--text3);font-family:var(--font);transition:all .15s}
.dtab.active{background:var(--card2);color:var(--text);border:1px solid var(--border2)}
.ticket-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:rgba(3,7,18,0.5);border-radius:8px;margin-bottom:6px;border:1px solid var(--border)}
.ticket-row-code{font-family:var(--mono);font-size:12px;color:var(--text)}
.ticket-used{opacity:.3;text-decoration:line-through}
.tag{font-size:10px;padding:3px 9px;border-radius:10px;font-weight:600}
.tag-free{background:rgba(16,185,129,0.12);color:#34d399}
.tag-used{background:rgba(239,68,68,0.12);color:#f87171}
.tag-cur{background:rgba(59,130,246,0.15);color:var(--accent2)}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);border:1px solid var(--border2);border-radius:var(--r);padding:12px 20px;font-size:13px;font-weight:500;color:var(--text);z-index:300;opacity:0;transition:all .3s;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast-success{border-color:rgba(16,185,129,0.3);background:rgba(16,185,129,0.1);color:#34d399}
.toast-error{border-color:rgba(239,68,68,0.3);background:rgba(239,68,68,0.1);color:#f87171}

/* MISC */
.loading{text-align:center;padding:60px 16px;color:var(--text2);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px}
.spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent2);border-right-color:var(--accent2);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 16px;box-shadow:0 0 20px rgba(59,130,246,0.2)}
.loading p{font-size:13px;font-weight:500;animation:pulseText 1.5s ease-in-out infinite}
@keyframes pulseText{0%,100%{opacity:0.5}50%{opacity:1}}
.empty{text-align:center;padding:40px 16px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:0.35}
.empty p{font-size:14px}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* COUPURE ÉLECTRIQUE */
.coupure-panel{border-radius:var(--r2);padding:16px;margin-bottom:12px;border:2px solid}
.coupure-on{background:rgba(239,68,68,0.08);border-color:rgba(239,68,68,0.4)}
.coupure-off{background:rgba(16,185,129,0.06);border-color:rgba(16,185,129,0.25)}
.coupure-info{display:flex;align-items:center;gap:12px}
.coupure-icon{font-size:28px;flex-shrink:0}
.coupure-title{font-weight:700;font-size:15px}
.coupure-on .coupure-title{color:#f87171}
.coupure-off .coupure-title{color:#34d399}
.coupure-sub{font-size:12px;color:var(--text3);margin-top:3px}

/* PRESET MESSAGES */
.preset-list{display:flex;flex-direction:column;gap:8px;margin-bottom:4px}
.preset-item{padding:10px 14px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;line-height:1.5}
.preset-item:hover,.preset-item.selected{border-color:var(--accent2);background:rgba(59,130,246,0.07);color:var(--text)}

/* NUMÉROS DE PAIEMENT AVEC NOMS */
.pay-num-row{display:flex;align-items:baseline;gap:10px;margin-bottom:6px}
.pay-num{font-family:var(--mono);font-size:17px;font-weight:700;color:#34d399;flex-shrink:0}
.pay-num-name{font-size:12px;color:rgba(52,211,153,0.7);font-style:italic}


.pay-box-warn{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.25);border-radius:var(--r);padding:10px 12px;margin:10px 0;font-size:12px;color:#fbbf24;line-height:1.5}



/* ═══ DATA ORB — Widget premium de consommation ═══ */
.data-orb-card{position:relative;border-radius:22px;padding:20px;margin-bottom:12px;overflow:hidden;border:1px solid}
.data-orb-good{background:linear-gradient(145deg,rgba(16,185,129,0.1),rgba(5,150,105,0.04));border-color:rgba(16,185,129,0.25)}
.data-orb-mid{background:linear-gradient(145deg,rgba(245,158,11,0.1),rgba(217,119,6,0.04));border-color:rgba(245,158,11,0.25)}
.data-orb-warning{background:linear-gradient(145deg,rgba(249,115,22,0.12),rgba(234,88,12,0.05));border-color:rgba(249,115,22,0.3)}
.data-orb-critical{background:linear-gradient(145deg,rgba(239,68,68,0.13),rgba(220,38,38,0.06));border-color:rgba(239,68,68,0.35);animation:criticalPulse 2.5s ease-in-out infinite}
@keyframes criticalPulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}50%{box-shadow:0 0 24px 2px rgba(239,68,68,0.15)}}
.data-orb-glow{position:absolute;top:-40%;right:-15%;width:180px;height:180px;background:radial-gradient(ellipse,rgba(255,255,255,0.06),transparent);pointer-events:none}
.data-orb-top{display:flex;justify-content:space-between;align-items:center;position:relative;z-index:1}
.data-orb-eyebrow{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);margin-bottom:6px}
.data-orb-headline{font-size:16px;font-weight:700}
.data-orb-ring-wrap{position:relative;width:84px;height:84px;flex-shrink:0}
.data-orb-ring{width:84px;height:84px;transform:rotate(-90deg)}
.data-orb-track{fill:none;stroke:rgba(255,255,255,0.07);stroke-width:7}
.data-orb-progress{fill:none;stroke-width:7;stroke-linecap:round;transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)}
.data-orb-progress-good{stroke:#34d399}
.data-orb-progress-mid{stroke:#fbbf24}
.data-orb-progress-warning{stroke:#fb923c}
.data-orb-progress-critical{stroke:#f87171}
.data-orb-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:20px;font-weight:700}
.data-orb-pct span{font-size:11px;margin-left:1px;opacity:0.7}
.data-orb-detail{font-size:12px;color:var(--text2);margin-top:14px;line-height:1.6;position:relative;z-index:1}
.data-orb-cta{display:inline-block;margin-top:6px;font-weight:600;color:#fca5a5}

</style>
</head>
