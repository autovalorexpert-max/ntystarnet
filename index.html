<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#030712">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NTY Starnet">
<link rel="manifest" href="/manifest.json">
<title>NTY Starnet — WiFi Manager</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#030712;--bg2:#060f1f;--bg3:#0a1628;--card:#0d1f38;--card2:#112240;
  --border:rgba(99,179,255,0.12);--border2:rgba(99,179,255,0.25);
  --accent:#3b82f6;--accent2:#60a5fa;--accent3:#93c5fd;
  --gold:#f59e0b;--gold2:#fbbf24;
  --success:#10b981;--danger:#ef4444;--warning:#f59e0b;--purple:#8b5cf6;
  --text:#f0f9ff;--text2:#94a3b8;--text3:#475569;
  --glow:0 0 30px rgba(59,130,246,0.15);
  --font:'Space Grotesk',sans-serif;--mono:'Space Mono',monospace;
  --r:12px;--r2:16px;--r3:24px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.page{display:none;min-height:100vh}
.page.active{display:block}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s)}
@keyframes twinkle{0%,100%{opacity:0.1}50%{opacity:var(--op,0.6)}}
.login-wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.login-glow{position:fixed;top:-100px;left:50%;transform:translateX(-50%);width:400px;height:400px;background:radial-gradient(ellipse,rgba(59,130,246,0.15) 0%,transparent 70%);pointer-events:none}
.logo-wrap{text-align:center;margin-bottom:32px}
.logo-svg-wrap{width:80px;height:80px;margin:0 auto 16px;position:relative}
.logo-ring{position:absolute;inset:0;border-radius:50%;border:2px solid var(--border2);animation:spin 8s linear infinite}
.logo-ring2{position:absolute;inset:6px;border-radius:50%;border:1px solid rgba(99,179,255,0.1);animation:spin 12s linear infinite reverse}
@keyframes spin{to{transform:rotate(360deg)}}
.logo-inner{position:absolute;inset:12px;background:linear-gradient(135deg,#0d1f38,#1a3a6e);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(59,130,246,0.3)}
.logo-name{font-family:var(--mono);font-size:26px;font-weight:700;letter-spacing:3px;background:linear-gradient(135deg,#60a5fa,#a78bfa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:12px;letter-spacing:4px;text-transform:uppercase;color:var(--text3);margin-top:4px}
.logo-tagline{font-size:13px;color:var(--text2);margin-top:8px}
.login-card{background:linear-gradient(135deg,rgba(13,31,56,0.9),rgba(17,34,64,0.9));border:1px solid var(--border2);border-radius:var(--r3);padding:28px;width:100%;max-width:380px;backdrop-filter:blur(20px);box-shadow:var(--glow),0 25px 50px rgba(0,0,0,0.5)}
.form-label{font-size:12px;font-weight:600;letter-spacing:0.05em;color:var(--text2);margin-bottom:6px;display:block;text-transform:uppercase}
.form-input{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:var(--r);font-size:14px;background:rgba(6,15,31,0.8);color:var(--text);margin-bottom:14px;outline:none;font-family:var(--font);transition:border-color .2s}
.form-input:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(59,130,246,0.1)}
.btn-login{width:100%;padding:14px;border:none;border-radius:var(--r);font-size:15px;font-weight:600;cursor:pointer;background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;font-family:var(--font);transition:all .2s;box-shadow:0 4px 20px rgba(59,130,246,0.3)}
.btn-login:disabled{opacity:0.7;cursor:not-allowed}
.app-wrap{position:relative;z-index:1;max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:80px}
.topbar{position:sticky;top:0;z-index:50;background:rgba(3,7,18,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.topbar-logo{display:flex;align-items:center;gap:10px}
.topbar-icon{width:32px;height:32px;background:linear-gradient(135deg,#1a3a6e,#2d3a8e);border-radius:8px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border2)}
.topbar-name{font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:2px;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.topbar-role{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase}
.content{padding:16px}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(6,15,31,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;z-index:50;padding:8px 0 12px}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 4px;cursor:pointer;border:none;background:none;color:var(--text3);font-size:10px;font-family:var(--font);letter-spacing:0.05em;text-transform:uppercase;transition:color .2s;position:relative}
.nav-btn.active{color:var(--accent2)}
.nav-dot{position:absolute;top:4px;right:calc(50% - 14px);width:7px;height:7px;background:var(--danger);border-radius:50%;border:2px solid var(--bg);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:12px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(99,179,255,0.3),transparent)}
.card-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);margin-bottom:12px}
.status-card{background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--border2);border-radius:var(--r2);padding:20px;margin-bottom:12px;position:relative;overflow:hidden}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center}
.stat-num{font-family:var(--mono);font-size:28px;font-weight:700;line-height:1}
.stat-lbl{font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-top:4px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-active{background:rgba(16,185,129,0.12);color:#34d399;border:1px solid rgba(16,185,129,0.2)}
.badge-expired{background:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(239,68,68,0.2)}
.badge-pending{background:rgba(245,158,11,0.12);color:#fbbf24;border:1px solid rgba(245,158,11,0.2)}
.badge-validated{background:rgba(16,185,129,0.12);color:#34d399;border:1px solid rgba(16,185,129,0.2)}
.badge-rejected{background:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(239,68,68,0.2)}
.btn{width:100%;padding:12px;border-radius:var(--r);border:none;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:var(--font);transition:all .15s;margin-bottom:8px}
.btn:active{transform:scale(0.97)}
.btn:disabled{opacity:0.6;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;box-shadow:0 4px 15px rgba(59,130,246,0.25)}
.btn-success{background:linear-gradient(135deg,#10b981,#059669);color:#fff}
.btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-sm{padding:8px 14px;font-size:13px;width:auto;margin:0}
.inp{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:var(--r);font-size:14px;background:rgba(6,15,31,0.6);color:var(--text);margin-bottom:10px;outline:none;font-family:var(--font);transition:border-color .2s}
.inp:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(59,130,246,0.08)}
.inp-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block}
textarea.inp{resize:vertical;min-height:80px}
select.inp{cursor:pointer}
.ticket-box{background:linear-gradient(135deg,rgba(59,130,246,0.08),rgba(99,102,241,0.08));border:1px solid var(--border2);border-radius:var(--r);padding:16px;text-align:center;margin-bottom:12px}
.ticket-code{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--accent2);letter-spacing:3px;word-break:break-all;margin-top:6px}
.plan-card{border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px;cursor:pointer;transition:all .2s;position:relative}
.plan-card.selected{border-color:var(--accent);border-width:2px;background:rgba(59,130,246,0.07)}
.plan-card.selected::before{content:'✓';position:absolute;top:8px;right:10px;color:var(--accent2);font-weight:700}
.pay-box{background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.2);border-radius:var(--r2);padding:16px;margin-bottom:14px}
.pay-num{font-family:var(--mono);font-size:16px;font-weight:700;color:#34d399;display:block;margin:3px 0}
.upload-zone{border:1.5px dashed var(--border2);border-radius:var(--r);padding:20px;text-align:center;cursor:pointer;color:var(--text3);font-size:13px;margin-bottom:10px;transition:all .2s}
.msg-list{padding:12px;min-height:200px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;max-height:320px}
.bubble{padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.6;max-width:82%;word-break:break-word}
.bubble-sent{background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;border-bottom-right-radius:4px;align-self:flex-end}
.bubble-recv{background:var(--card2);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:4px;align-self:flex-start}
.msg-meta{font-size:10px;color:var(--text3);margin-top:3px}
.chat-inp-row{border-top:1px solid var(--border);padding:10px 12px;display:flex;gap:8px;align-items:center}
.client-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer}
.client-row:last-child{border-bottom:none}
.avatar{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#1a3a6e,#2d3a8e);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--accent2);flex-shrink:0;border:1px solid var(--border2)}
.ticket-item{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:rgba(6,15,31,0.6);border-radius:8px;margin-bottom:6px;border:1px solid var(--border)}
.ticket-used{opacity:.35;text-decoration:line-through}
.tag{font-size:10px;padding:3px 8px;border-radius:10px;font-weight:600}
.tag-used{background:rgba(239,68,68,0.12);color:#f87171}
.tag-free{background:rgba(16,185,129,0.12);color:#34d399}
.tag-cur{background:rgba(59,130,246,0.15);color:var(--accent2)}
.notif-bar{display:flex;gap:10px;padding:12px 14px;border-radius:var(--r);margin-bottom:8px;font-size:13px;align-items:flex-start;border:1px solid}
.notif-success{background:rgba(16,185,129,0.06);border-color:rgba(16,185,129,0.2);color:#34d399}
.notif-warning{background:rgba(245,158,11,0.06);border-color:rgba(245,158,11,0.2);color:#fbbf24}
.notif-info{background:rgba(59,130,246,0.06);border-color:rgba(59,130,246,0.2);color:var(--accent2)}
.notif-danger{background:rgba(239,68,68,0.06);border-color:rgba(239,68,68,0.2);color:#f87171}
.divider{height:1px;background:var(--border);margin:14px 0}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:var(--r3) var(--r3) 0 0;padding:24px;width:100%;max-width:430px;max-height:88vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;cursor:pointer;color:var(--text3);font-size:22px;line-height:1;padding:0}
.progress-wrap{margin-bottom:14px}
.progress-label{display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px}
.progress-bar{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em}
.pay-row{padding:12px 0;border-bottom:1px solid var(--border)}
.pay-row:last-child{border-bottom:none}
.back-btn{background:none;border:none;cursor:pointer;color:var(--text2);display:flex;align-items:center;gap:6px;font-size:14px;font-family:var(--font);padding:0;margin-bottom:14px;font-weight:500}
.expiry-bar{height:4px;border-radius:2px;margin-top:8px;background:rgba(255,255,255,0.06);overflow:hidden}
.expiry-fill{height:100%;border-radius:2px}
.search-wrap{position:relative;margin-bottom:12px}
.search-inp{width:100%;padding:11px 14px 11px 38px;border:1px solid var(--border);border-radius:var(--r);font-size:14px;background:rgba(6,15,31,0.6);color:var(--text);outline:none;font-family:var(--font)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3)}
.tabs{display:flex;gap:4px;background:rgba(6,15,31,0.6);border-radius:var(--r);padding:4px;margin-bottom:16px;border:1px solid var(--border)}
.tab{flex:1;padding:9px;text-align:center;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;border:none;background:transparent;color:var(--text3);text-transform:uppercase;transition:all .15s}
.tab.active{background:var(--card2);color:var(--text);border:1px solid var(--border2)}
.revenue-card{background:linear-gradient(135deg,rgba(245,158,11,0.08),rgba(217,119,6,0.05));border:1px solid rgba(245,158,11,0.2);border-radius:var(--r2);padding:16px;margin-bottom:12px}
.revenue-num{font-family:var(--mono);font-size:28px;font-weight:700;color:var(--gold2)}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.info-key{font-size:12px;color:var(--text3)}
.info-val{font-size:13px;font-weight:500}
.empty{text-align:center;padding:32px 16px;color:var(--text3);font-size:13px}
.empty-icon{font-size:36px;margin-bottom:10px;opacity:0.4}
.loading{text-align:center;padding:40px;color:var(--text3)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent2);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp 0.3s ease}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<!-- LOGIN -->
<div class="page active" id="page-login">
  <div class="login-glow"></div>
  <div class="login-wrap">
    <div class="logo-wrap fade-up">
      <div class="logo-svg-wrap">
        <div class="logo-ring"></div>
        <div class="logo-ring2"></div>
        <div class="logo-inner">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
            <path d="M5 12.55a11 11 0 0 1 14.08 0" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
            <path d="M1.42 9a16 16 0 0 1 21.16 0" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
            <path d="M8.53 16.11a6 6 0 0 1 6.95 0" stroke="#34d399" stroke-width="2" stroke-linecap="round"/>
            <circle cx="12" cy="20" r="1.5" fill="#60a5fa"/>
          </svg>
        </div>
      </div>
      <div class="logo-name">NTY STARNET</div>
      <div class="logo-sub">WiFi Manager Pro</div>
      <div class="logo-tagline">Votre connexion, notre priorité</div>
    </div>
    <div class="login-card fade-up">
      <div style="margin-bottom:20px">
        <div style="font-size:18px;font-weight:700;margin-bottom:4px">Connexion</div>
        <div style="font-size:13px;color:var(--text2)">Accédez à votre espace personnel</div>
      </div>
      <label class="form-label">Nom d'utilisateur</label>
      <input class="form-input" type="text" id="login-user" placeholder="Entrez votre username" autocomplete="username">
      <label class="form-label">Mot de passe</label>
      <div style="position:relative">
        <input class="form-input" type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" style="padding-right:44px">
        <button onclick="togglePass()" style="position:absolute;right:12px;top:50%;transform:translateY(-58%);background:none;border:none;cursor:pointer;color:var(--text3)">👁</button>
      </div>
      <div id="login-err" style="color:#f87171;font-size:13px;margin-bottom:10px;display:none;padding:10px;background:rgba(239,68,68,0.08);border-radius:8px">⚠️ Identifiants incorrects</div>
      <button class="btn-login" onclick="doLogin()" id="login-btn">Se connecter →</button>
    </div>
    <div style="text-align:center;font-size:12px;color:var(--text3);margin-top:20px">© 2026 NTY Starnet · Tous droits réservés</div>
  </div>
</div>

<!-- CLIENT -->
<div class="page" id="page-client">
  <div class="topbar">
    <div class="topbar-logo">
      <div class="topbar-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2.5"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1" fill="#60a5fa"/></svg>
      </div>
      <div><div class="topbar-name">NTY STARNET</div><div class="topbar-role">Espace client</div></div>
    </div>
    <button onclick="logout()" style="background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;cursor:pointer;color:var(--text3);font-size:12px;font-family:var(--font)">Déco.</button>
  </div>
  <div class="app-wrap"><div class="content" id="c-content"></div></div>
  <div class="bottom-nav">
    <button class="nav-btn active" onclick="cPage('home',this)" id="cnav-home">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Accueil
    </button>
    <button class="nav-btn" onclick="cPage('paiement',this)" id="cnav-paiement">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
      Paiement
    </button>
    <button class="nav-btn" onclick="cPage('messages',this)" id="cnav-msg">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Messages
      <span class="nav-dot" id="c-msg-dot" style="display:none"></span>
    </button>
    <button class="nav-btn" onclick="cPage('profil',this)" id="cnav-profil">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profil
    </button>
  </div>
</div>

<!-- ADMIN -->
<div class="page" id="page-admin">
  <div class="topbar">
    <div class="topbar-logo">
      <div class="topbar-icon">

// ═══ SUPABASE API ═══
async function sb(table, method='GET', body=null, query=''){
  const url = SB_URL+'/rest/v1/'+table+(query?'?'+query:'');
  const headers = {
    'apikey': SB_KEY,
    'Authorization': 'Bearer '+SB_KEY,
    'Content-Type': 'application/json',
    'Prefer': method==='POST'?'return=representation':'return=representation'
  };
  const res = await fetch(url, {method, headers, body: body?JSON.stringify(body):null});
  if(!res.ok){const e=await res.text();throw new Error(e);}
  const txt = await res.text();
  return txt ? JSON.parse(txt) : [];
}

async function sbGet(table, query=''){return sb(table,'GET',null,query);}
async function sbPost(table, data){return sb(table,'POST',data);}
async function sbPatch(table, query, data){return sb(table,'PATCH',data,query);}
async function sbDelete(table, query){return sb(table,'DELETE',null,query);}

function fmtDate(d){if(!d)return'—';try{return new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});}catch{return d;}}
function daysLeft(exp){if(!exp)return null;const diff=Math.ceil((new Date(exp)-new Date())/(1000*60*60*24));return diff;}

async function changePass(){
  const old=document.getElementById('old-pass').value;
  const n=document.getElementById('new-pass').value;
  const conf=document.getElementById('conf-pass').value;
  if(old!==me.password){alert('Mot de passe actuel incorrect');return;}
  if(n.length<4){alert('Mot de passe trop court (min 4 caractères)');return;}
  if(n!==conf){alert('Les mots de passe ne correspondent pas');return;}
  try{
    const table=me.role==='admin'?'admins':'clients';
    await sbPatch(table,'id=eq.'+me.id,{password:n});
    me.password=n;
    closeModal();
    showModal('<div style="text-align:center;padding:10px"><div style="font-size:40px;margin-bottom:12px">🔐</div><div style="font-size:16px;font-weight:700;margin-bottom:8px">Mot de passe modifié !</div><button class="btn btn-primary" onclick="closeModal()">OK</button></div>');
  }catch(e){alert('Erreur lors de la modification');}
}

// ═══ ADMIN NAV ═══
function aPage(page,btn){
  document.querySelectorAll('#page-admin .nav-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  const c=document.getElementById('a-content');
  loading(c);
  if(page==='dashboard')renderAdminDashboard();
  else if(page==='clients')renderAdminClients();
  else if(page==='paiements')renderAdminPaiements();
  else if(page==='messages')renderAdminMessages();
  else if(page==='stats')renderAdminStats();
}

// ═══ ADMIN DASHBOARD ═══
async function renderAdminDashboard(){
  const c=document.getElementById('a-content');
  try{
    const [clients,payments] = await Promise.all([
      sbGet('clients'),
      sbGet('payments','order=created_at.desc')
    ]);
    const actifs=clients.filter(x=>x.status==='active').length;
    const expires=clients.filter(x=>x.status==='expired').length;
    const pending=clients.filter(x=>x.status==='pending').length;
    const pPending=payments.filter(p=>p.status==='pending');
    const revenue=payments.filter(p=>p.status==='validated').reduce((s,p)=>s+(parseInt((p.amount||'0').replace('.',''))||0),0);
    const dot=document.getElementById('a-pay-dot');
    if(dot)dot.style.display=pPending.length>0?'block':'none';
    let html='<div class="fade-up"><div style="font-size:20px;font-weight:700;margin-bottom:16px">Tableau de bord</div>';
    html+='<div class="revenue-card"><div class="card-title" style="color:var(--gold)">💰 Revenus totaux validés</div><div class="revenue-num">'+revenue.toLocaleString('fr')+' Ar</div><div style="font-size:12px;color:var(--text3);margin-top:4px">'+payments.filter(p=>p.status==='validated').length+' paiements validés</div></div>';
    html+='<div class="stat-grid"><div class="stat-box"><div class="stat-num" style="color:var(--accent2)">'+clients.length+'</div><div class="stat-lbl">Total clients</div></div><div class="stat-box"><div class="stat-num" style="color:var(--success)">'+actifs+'</div><div class="stat-lbl">Actifs</div></div><div class="stat-box"><div class="stat-num" style="color:var(--warning)">'+pending+'</div><div class="stat-lbl">En attente</div></div><div class="stat-box"><div class="stat-num" style="color:var(--danger)">'+expires+'</div><div class="stat-lbl">Expirés</div></div></div>';
    if(pPending.length>0){
      html+='<div class="card"><div class="section-header"><div class="section-title">🔔 Paiements en attente</div><span class="badge badge-pending">'+pPending.length+'</span></div>';
      for(const p of pPending.slice(0,3)){
        const cTickets=await sbGet('tickets','client_id=eq.'+p.client_id+'&is_used=eq.false&order=created_at.asc&limit=1');
        const next=cTickets[0];
        html+='<div class="pay-row"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px"><div><div style="font-weight:600;font-size:14px">'+p.client_name+'</div><div style="font-size:12px;color:var(--text3)">'+p.plan+' · '+fmtDate(p.payment_date)+'</div>'+(next?'<div style="font-size:12px;color:var(--success);margin-top:2px">Ticket: '+next.code+'</div>':'<div style="font-size:12px;color:var(--danger);margin-top:2px">⚠️ Aucun ticket dispo</div>')+'</div><div style="font-family:var(--mono);font-size:14px;font-weight:700">'+(p.amount||'—')+' Ar</div></div><div style="display:flex;gap:6px"><button class="btn btn-success" style="flex:2;padding:9px;margin:0;font-size:13px" onclick="openValidate(\''+p.id+'\')">✓ Valider</button><button class="btn btn-danger" style="flex:1;padding:9px;margin:0;font-size:13px" onclick="curPayId=\''+p.id+'\';rejectConfirm()">✗</button></div></div>';
      }
      html+='</div>';
    }
    // Expirent bientôt
    const soon=clients.filter(x=>{const dl=daysLeft(x.expiry_date);return dl!==null&&dl>=0&&dl<=7;});
    if(soon.length>0){

// ═══ VALIDATE PAY ═══
async function openValidate(payId){
  curPayId=payId;
  try{
    const [pays,] = await Promise.all([sbGet('payments','id=eq.'+payId)]);
    const pay=pays[0];
    const cTickets=await sbGet('tickets','client_id=eq.'+pay.client_id+'&is_used=eq.false&order=created_at.asc&limit=1');
    const next=cTickets[0];
    let html='<div class="modal-title">Valider le paiement <button class="modal-close" onclick="closeModal()">×</button></div>';
    html+='<div style="font-size:14px;color:var(--text2);margin-bottom:14px">Client : <strong style="color:var(--text)">'+pay.client_name+'</strong></div>';
    html+=[['Plan',pay.plan],['Montant',(pay.amount||'—')+' Ar'],['Date',fmtDate(pay.payment_date)],['Référence',pay.reference||'—']].map(([k,v])=>'<div class="info-row"><div class="info-key">'+k+'</div><div class="info-val">'+v+'</div></div>').join('');
    if(pay.photo_url)html+='<div style="margin:12px 0"><div class="inp-label">Preuve</div><img src="'+pay.photo_url+'" style="width:100%;border-radius:8px;max-height:160px;object-fit:cover;border:1px solid var(--border)"></div>';
    html+='<div class="divider"></div>';
    html+='<div class="ticket-box"><div style="font-size:11px;color:var(--text3);margin-bottom:4px">TICKET QUI SERA ENVOYÉ</div><div class="ticket-code">'+(next?next.code:'—')+'</div></div>';
    if(!next)html+='<div style="color:var(--danger);font-size:13px;margin-bottom:12px;padding:10px;background:rgba(239,68,68,0.08);border-radius:8px">⚠️ Aucun ticket disponible. Ajoutez des tickets dans la fiche client.</div>';
    if(next)html+='<button class="btn btn-success" onclick="validatePay(\''+payId+'\',\''+next.id+'\',\''+next.code+'\',\''+pay.client_id+'\')">✓ Valider et envoyer le ticket</button>';
    html+='<button class="btn btn-danger" onclick="closeModal();rejectConfirm()">✗ Refuser</button><button class="btn btn-ghost" onclick="closeModal()">Annuler</button>';
    showModal(html);
  }catch(e){alert('Erreur chargement');}
}

async function validatePay(payId,ticketId,ticketCode,clientId){
  try{
    const exp=new Date();exp.setDate(exp.getDate()+30);
    const expStr=exp.toISOString().split('T')[0];
    await sbPatch('payments','id=eq.'+payId,{status:'validated'});
    await sbPatch('tickets','id=eq.'+ticketId,{is_used:true,is_current:true});
    await sbPatch('clients','id=eq.'+clientId,{status:'active',current_ticket:ticketCode,expiry_date:expStr});
    await sbPost('messages',{client_id:clientId,sender:'admin',sender_name:'Admin',content:'✅ Paiement validé ! Votre ticket Mikrotik : '+ticketCode+'\n\nValable 30 jours jusqu\'au '+fmtDate(expStr)+'. Connectez-vous avec ce code sur le réseau NTY Starnet.'});
    closeModal();
    showModal('<div style="text-align:center;padding:10px"><div style="font-size:48px;margin-bottom:12px">🎉</div><div style="font-size:17px;font-weight:700;margin-bottom:8px">Ticket envoyé !</div><div class="ticket-box" style="margin-bottom:12px"><div class="ticket-code">'+ticketCode+'</div></div><button class="btn btn-primary" onclick="closeModal();aPage(\'paiements\',null)">OK</button></div>');
  }catch(e){alert('Erreur lors de la validation');}
}

function rejectConfirm(){
  showModal('<div class="modal-title">Refuser <button class="modal-close" onclick="closeModal()">×</button></div><div style="font-size:13px;color:var(--text2);margin-bottom:14px">Le client sera notifié du refus.</div><label class="inp-label">Motif (optionnel)</label><input class="inp" type="text" id="reject-reason" placeholder="Ex: Référence incorrecte"><button class="btn btn-danger" onclick="doReject()">✗ Confirmer le refus</button><button class="btn btn-ghost" onclick="closeModal()">Annuler</button>');
}

async function doReject(){
  const reason=document.getElementById('reject-reason')?.value||'';
  try{
    const pays=await sbGet('payments','id=eq.'+curPayId);
    const pay=pays[0];
    await sbPatch('payments','id=eq.'+curPayId,{status:'rejected'});
    await sbPost('messages',{client_id:pay.client_id,sender:'admin',sender_name:'Admin',content:'❌ Votre paiement du '+fmtDate(pay.payment_date)+' a été refusé.'+(reason?' Motif: '+reason:'')+' Veuillez nous recontacter.'});
    closeModal();aPage('paiements',null);
  }catch(e){alert('Erreur');}
}

// ═══ ADMIN DETAIL CLIENT ═══
async function openDetail(id){

  try{

      sbGet('clients','id=eq.'+id),
      sbGet('tickets','client_id=eq.'+id+'&order=created_at.asc'),

    const freeT=tickets.filter(t=>!t.is_used);

    html+='<div id="dt-info">';

    html+='<div style="display:flex;gap:8px;margin-top:12px"><button class="btn btn-success" style="flex:1;padding:9px;margin:0;font-size:13px" onclick="quickStatus(\''+id+'\',\'active\')">✓ Activer</button><button class="btn btn-danger" style="flex:1;padding:9px;margin:0;font-size:13px" onclick="quickStatus(\''+id+'\',\'expired\')">✗ Expirer</button></div>';
    html+='<button class="btn" style="margin-top:8px;background:rgba(239,68,68,0.1);color:var(--danger);border:1px solid rgba(239,68,68,0.2)" onclick="deleteClient(\''+id+'\',\''+cl.name+'\')">🗑 Supprimer ce client</button>';
    html+='</div>';
    // Tickets tab
    html+='<div id="dt-tickets" style="display:none"><label class="inp-label">Ajouter des tickets (un par ligne)</label><textarea class="inp" id="new-tickets-inp" placeholder="ABC123-XYZ&#10;DEF456-UVW&#10;..."></textarea><button class="btn btn-success" onclick="addMoreTickets(\''+id+'\')">+ Ajouter</button><div style="margin-top:10px">';
    if(!tickets.length)html+='<div class="empty"><div class="empty-icon">🎫</div>Aucun ticket</div>';
    else tickets.forEach((t,i)=>{html+='<div class="ticket-item '+(t.is_used?'ticket-used':'')+'"><span style="font-family:var(--mono);font-size:12px">'+(i+1)+'. '+t.code+(t.is_current?' 👈':'')+'</span><span class="tag '+(t.is_current?'tag-cur':t.is_used?'tag-used':'tag-free')+'">'+(t.is_current?'Actuel':t.is_used?'Utilisé':'Dispo')+'</span></div>';});
    html+='</div></div>';

    html+='<div id="dt-edit" style="display:none"><label class="inp-label">Nom complet</label><input class="inp" type="text" id="edit-name" value="'+cl.name+'"><label class="inp-label">Username</label><input class="inp" type="text" id="edit-user" value="'+cl.username+'"><label class="inp-label">Nouveau mot de passe (vide = pas de changement)</label><input class="inp" type="password" id="edit-pass" placeholder="Nouveau mot de passe"><label class="inp-label">Téléphone</label><input class="inp" type="tel" id="edit-phone" value="'+(cl.phone||'')+'"><label class="inp-label">Plan</label><select class="inp" id="edit-plan">'+['100 Go','200 Go','Illimité 5 appareils','Illimité 9+ appareils'].map(p=>'<option '+(cl.plan===p?'selected':'')+'>'+p+'</option>').join('')+'</select><button class="btn btn-primary" onclick="saveClientEdit(\''+id+'\')">💾 Enregistrer</button></div>';

function dtab(tab,btn){
  document.querySelectorAll('#modal-content .tab').forEach(t=>t.classList.remove('active'));
  if(btn)btn.classList.add('active');
  ['info','tickets','edit'].forEach(t=>{const el=document.getElementById('dt-'+t);if(el)el.style.display=t===tab?'block':'none';});
}

async function quickStatus(id,status){
  try{await sbPatch('clients','id=eq.'+id,{status});closeModal();renderAdminClients();}
  catch(e){alert('Erreur');}
}

async function deleteClient(id,name){
  if(!confirm('Supprimer "'+name+'" ? Action irréversible.'))return;
  try{await sbDelete('clients','id=eq.'+id);closeModal();renderAdminClients();}
  catch(e){alert('Erreur suppression');}
}

async function addMoreTickets(clientId){
  const raw=document.getElementById('new-tickets-inp')?.value.trim();
  if(!raw){alert('Entrez au moins un ticket.');return;}
  const codes=raw.split('\n').map(t=>t.trim()).filter(t=>t);
  try{
    for(const code of codes){await sbPost('tickets',{client_id:clientId,code,is_used:false,is_current:false});}
    alert('✅ '+codes.length+' ticket(s) ajouté(s) !');
    openDetail(clientId);
  }catch(e){alert('Erreur ajout tickets');}
}

async function saveClientEdit(id){
  const name=document.getElementById('edit-name').value.trim();
  const user=document.getElementById('edit-user').value.trim().toLowerCase();
  const pass=document.getElementById('edit-pass').value;
  const phone=document.getElementById('edit-phone').value.trim();
  const plan=document.getElementById('edit-plan').value;
  const prices={'100 Go':'40.000','200 Go':'55.000','Illimité 5 appareils':'65.000','Illimité 9+ appareils':'90.000'};
  if(!name||!user){alert('Nom et username requis');return;}
  const updates={name,username:user,phone,plan,plan_price:prices[plan]};
  if(pass){if(pass.length<4){alert('Mot de passe trop court');return;}updates.password=pass;}
  try{
    await sbPatch('clients','id=eq.'+id,updates);
    closeModal();
    showModal('<div style="text-align:center;padding:10px"><div style="font-size:40px;margin-bottom:12px">✅</div><div style="font-size:16px;font-weight:700;margin-bottom:8px">Client modifié !</div>'+(pass?'<div style="font-size:13px;color:var(--text2)">Nouveau MDP: <strong>'+pass+'</strong></div>':'')+'<button class="btn btn-primary" style="margin-top:12px" onclick="closeModal();renderAdminClients()">OK</button></div>');
  }catch(e){alert('Erreur modification. Username peut-être déjà utilisé.');}
}
